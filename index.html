
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkFormulator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        /* Arctic Frost theme (theme-factory): ice blue #d4e4f7, steel blue #4a6fa5,
           silver #c0c0c0, crisp white #fafafa. The app's sky/slate/emerald/blue
           utility classes are remapped so the theme applies everywhere. */
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        sky: {
                            50: '#eef3fa', 100: '#dce7f4', 200: '#c0d3ea', 300: '#9cb9dc',
                            400: '#7093c4', 500: '#4a6fa5', 600: '#3e5d8b', 700: '#344d73',
                            800: '#2b3f5d', 900: '#24344c', 950: '#172130'
                        },
                        blue: {
                            50: '#eef3fa', 100: '#dce7f4', 200: '#c0d3ea', 300: '#9cb9dc',
                            400: '#7093c4', 500: '#4a6fa5', 600: '#3e5d8b', 700: '#344d73',
                            800: '#2b3f5d', 900: '#24344c', 950: '#172130'
                        },
                        slate: {
                            50: '#fafafa', 100: '#f1f4f8', 200: '#dfe6ee', 300: '#c0c0c0',
                            400: '#9aa5b5', 500: '#71809a', 600: '#55637e', 700: '#3e4a63',
                            800: '#2c374d', 900: '#202c40', 950: '#131b2a'
                        },
                        emerald: {
                            50: '#f4f8fd', 100: '#e6eff9', 200: '#d4e4f7', 300: '#b3cfec',
                            400: '#8fb6df', 500: '#6d9bcd', 600: '#547fb4', 700: '#446794',
                            800: '#3a5578', 900: '#324763', 950: '#212e42'
                        }
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DejaVu Sans', Verdana, 'Inter', sans-serif; }
        /* Remove spin buttons for all number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        @media print {
            @page {
                margin: 1cm;
                size: portrait;
            }
            body {
                background: white !important;
            }
            /* Hide everything that isn't the active printable result */
            .no-print {
                display: none !important;
            }
            /* Helper to ensure the result panel takes the whole page */
            .print-full-page {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                background-color: white !important;
                color: black !important;
                padding: 1.5cm !important;
                margin: 0 !important;
                z-index: 9999 !important;
                border: none !important;
                box-shadow: none !important;
            }
            .print-full-page * {
                color: black !important;
                border-color: #e2e8f0 !important;
            }
            /* Specifically for the result panel backgrounds in print */
            .print-full-page .bg-slate-800, 
            .print-full-page .bg-slate-800\/50,
            .print-full-page .bg-slate-900 {
                background-color: #f8fafc !important;
                border: 1px solid #e2e8f0 !important;
            }
            /* Ensure the text is readable */
            .print-full-page .text-blue-400,
            .print-full-page .text-emerald-400 {
                color: #2563eb !important; /* Solid blue for print */
                font-weight: 800 !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {

}
</script>

</head>

</html>
